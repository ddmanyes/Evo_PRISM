<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分析歷史 — Hermes Bio-Memory</title>
<style>
  :root {
    --bg: #f0f2f5; --card: #ffffff; --text: #1a1a2e; --muted: #6c757d;
    --accent: #2563eb; --border: #e2e8f0;
    --sidebar: #1e293b; --sidebar-text: #94a3b8; --sidebar-active: #ffffff;
    --green: #22c55e; --red: #ef4444; --gray: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

  .sidebar { width: 220px; background: var(--sidebar); display: flex; flex-direction: column;
             padding: 16px 12px; gap: 4px; flex-shrink: 0; }
  .sidebar-logo { color: white; font-size: 15px; font-weight: 700; padding: 8px 12px 16px;
                  border-bottom: 1px solid #334155; margin-bottom: 8px; }
  .sidebar-logo span { color: #60a5fa; }
  .sidebar-link { color: var(--sidebar-text); text-decoration: none; padding: 8px 12px;
                  border-radius: 6px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .sidebar-link:hover, .sidebar-link.active { background: #334155; color: var(--sidebar-active); }
  .sidebar-bottom { margin-top: auto; }
  .health-dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8;
                display: inline-block; margin-right: 6px; }
  .health-dot.ok  { background: var(--green); }
  .health-dot.err { background: var(--red); }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
  .topbar { background: var(--card); border-bottom: 1px solid var(--border);
            padding: 12px 24px; display: flex; align-items: center; gap: 12px; }
  .topbar-title { font-weight: 600; font-size: 15px; }
  .filter-row { display: flex; gap: 8px; align-items: center; margin-left: auto; }
  input[type=text] { border: 1px solid var(--border); border-radius: 7px; padding: 6px 12px;
                     font-size: 13px; outline: none; background: var(--bg); width: 200px; }
  input[type=text]:focus { border-color: var(--accent); }
  select { border: 1px solid var(--border); border-radius: 7px; padding: 6px 10px;
           font-size: 13px; outline: none; background: var(--bg); cursor: pointer; }

  .content { flex: 1; overflow-y: auto; padding: 24px; }
  .stats-row { display: flex; gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border-radius: 10px; padding: 14px 20px;
               border: 1px solid var(--border); flex: 1; }
  .stat-num   { font-size: 24px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

  table { width: 100%; border-collapse: collapse; background: var(--card);
          border-radius: 10px; overflow: hidden; border: 1px solid var(--border); font-size: 13px; }
  thead { background: var(--accent); color: white; }
  th { padding: 10px 14px; text-align: left; font-weight: 500; }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #f0f4ff; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-completed { background: #dcfce7; color: #166534; }
  .badge-running   { background: #fef9c3; color: #854d0e; }
  .badge-failed    { background: #fee2e2; color: #991b1b; }
  .badge-stale     { background: #f1f5f9; color: #475569; }

  .summary-cell { max-width: 280px; white-space: nowrap; overflow: hidden;
                  text-overflow: ellipsis; color: var(--muted); font-size: 12px; }
  .view-btn { padding: 4px 10px; border-radius: 5px; border: 1px solid var(--accent);
              color: var(--accent); background: white; font-size: 12px; cursor: pointer;
              text-decoration: none; display: inline-block; }
  .view-btn:hover { background: var(--accent); color: white; }
  .no-report { color: var(--gray); font-size: 12px; }

  .empty   { text-align: center; padding: 60px 0; color: var(--muted); }
  .loading { text-align: center; padding: 40px 0; color: var(--muted); font-size: 14px; }

  .preview-btn { padding: 3px 8px; border-radius: 5px; border: 1px solid #7c3aed;
                 color: #7c3aed; background: white; font-size: 11px; cursor: pointer;
                 margin-left: 6px; white-space: nowrap; }
  .preview-btn:hover { background: #7c3aed; color: white; }
  .thumb-row { display: none; background: #faf5ff; border-bottom: 1px solid var(--border); }
  .thumb-row.open { display: table-row; }
  .thumb-row td { padding: 10px 14px; }
  .thumb-strip { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; }
  .thumb-card { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .thumb-card img { max-height: 80px; max-width: 120px; border-radius: 4px;
                    border: 1px solid var(--border); cursor: pointer; object-fit: contain; }
  .thumb-card a { font-size: 10px; color: var(--accent); text-decoration: none; }
  .thumb-card a:hover { text-decoration: underline; }
  .thumb-loading { color: var(--muted); font-size: 12px; }
  .thumb-empty   { color: var(--muted); font-size: 12px; font-style: italic; }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">🧬 <span>Hermes</span> Bio</div>
  <a href="/" class="sidebar-link">💬 聊天</a>
  <a href="/history" class="sidebar-link active">📋 分析歷史</a>
  <div class="sidebar-bottom">
    <div class="sidebar-link">
      <span class="health-dot" id="health-dot"></span>
      <span id="health-text">檢查中…</span>
    </div>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">📋 分析歷史記錄</div>
    <div class="filter-row">
      <input type="text" id="search-input" placeholder="搜尋樣本 ID…">
      <select id="type-filter">
        <option value="">全部類型</option>
        <option value="eda_report">eda_report</option>
        <option value="bulk_eda">bulk_eda</option>
        <option value="qc_stats">qc_stats</option>
      </select>
      <select id="status-filter">
        <option value="">全部狀態</option>
        <option value="completed">completed</option>
        <option value="running">running</option>
        <option value="failed">failed</option>
      </select>
    </div>
  </div>

  <div class="content">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">分析總數</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-completed">—</div><div class="stat-label">已完成</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-samples">—</div><div class="stat-label">涉及樣本</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-reports">—</div><div class="stat-label">可查閱報告</div></div>
    </div>
    <div id="table-container" class="loading">載入中…</div>
  </div>
</div>

<script>
let allData = [];

async function checkHealth() {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    document.getElementById('health-dot').className = 'health-dot ' + (d.ok ? 'ok' : 'err');
    document.getElementById('health-text').textContent = d.ok
      ? 'DB: ' + d.db.sample_count + ' 樣本' : 'DB 異常';
  } catch {
    document.getElementById('health-dot').className = 'health-dot err';
  }
}

async function loadHistory() {
  try {
    const r = await fetch('/api/history?limit=200');
    allData = await r.json();
    updateStats(allData);
    renderTable(allData);
  } catch (e) {
    document.getElementById('table-container').innerHTML =
      '<div class="empty">載入失敗：' + escHtml(e.message) + '</div>';
  }
}

function updateStats(data) {
  document.getElementById('stat-total').textContent     = data.length;
  document.getElementById('stat-completed').textContent = data.filter(r => r.status === 'completed').length;
  document.getElementById('stat-samples').textContent   = new Set(data.map(r => r.sample_id)).size;
  document.getElementById('stat-reports').textContent   = data.filter(r => r.has_report).length;
}

function badgeHtml(status) {
  const cls = { completed: 'badge-completed', running: 'badge-running',
                failed: 'badge-failed', stale: 'badge-stale' }[status] || 'badge-stale';
  return '<span class="badge ' + cls + '">' + escHtml(status) + '</span>';
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('zh-TW') + ' ' +
         d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
}

function renderTable(data) {
  const container = document.getElementById('table-container');
  if (data.length === 0) {
    container.innerHTML = '<div class="empty">沒有符合條件的分析記錄</div>';
    return;
  }
  const rows = data.map(r => {
    const aid = escHtml(r.analysis_id);
    const previewBtn = r.has_report
      ? '<button class="preview-btn" onclick="fetchThumbs(\'' + aid + '\', this)">🖼 預覽</button>'
      : '';
    const viewBtn = r.has_report
      ? '<a href="/results/' + aid + '" target="_blank" class="view-btn">查看報告</a>' + previewBtn
      : '<span class="no-report">—</span>';
    const dataRow = '<tr>' +
      '<td>' + escHtml(r.sample_id || '—') + '</td>' +
      '<td><code>' + escHtml(r.analysis_type || '—') + '</code></td>' +
      '<td>' + badgeHtml(r.status) + '</td>' +
      '<td>' + fmtDate(r.completed_at) + '</td>' +
      '<td class="summary-cell" title="' + escHtml(r.summary || '') + '">' + escHtml(r.summary || '—') + '</td>' +
      '<td>' + viewBtn + '</td>' +
      '</tr>';
    const thumbRow = '<tr class="thumb-row" id="thumb-' + aid + '">' +
      '<td colspan="6"><div class="thumb-strip thumb-loading">載入中…</div></td>' +
      '</tr>';
    return dataRow + (r.has_report ? thumbRow : '');
  }).join('');

  container.innerHTML = '<table>' +
    '<thead><tr><th>樣本 ID</th><th>分析類型</th><th>狀態</th><th>完成時間</th><th>摘要</th><th>報告</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table>';
}

async function fetchThumbs(analysisId, btnEl) {
  const thumbRow = document.getElementById('thumb-' + analysisId);
  if (!thumbRow) return;

  // Toggle: if already open, close it
  if (thumbRow.classList.contains('open')) {
    thumbRow.classList.remove('open');
    btnEl.textContent = '🖼 預覽';
    return;
  }

  thumbRow.classList.add('open');
  btnEl.textContent = '▲ 關閉';

  // Only fetch once (strip replaces the loading placeholder)
  const strip = thumbRow.querySelector('.thumb-strip');
  if (!strip || !strip.classList.contains('thumb-loading')) return;

  try {
    const resp = await fetch('/api/results/' + analysisId + '/images');
    const images = await resp.json();
    if (!Array.isArray(images) || images.length === 0) {
      strip.className = 'thumb-strip thumb-empty';
      strip.textContent = '此報告沒有圖片';
      return;
    }
    strip.className = 'thumb-strip';
    strip.innerHTML = images.map(img => {
      const fname = escHtml(img.filename);
      return '<div class="thumb-card">' +
        '<img src="' + img.data_uri + '" alt="' + fname + '" title="' + fname + '" ' +
             'onclick="window.open(this.src)">' +
        '<a href="' + img.data_uri + '" download="' + fname + '">⬇ ' + fname + '</a>' +
        '</div>';
    }).join('');
  } catch (e) {
    strip.className = 'thumb-strip thumb-empty';
    strip.textContent = '圖片載入失敗：' + escHtml(e.message);
  }
}

function filterData() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const type   = document.getElementById('type-filter').value;
  const status = document.getElementById('status-filter').value;
  const filtered = allData.filter(r =>
    (!search || (r.sample_id || '').toLowerCase().includes(search)) &&
    (!type   || r.analysis_type === type) &&
    (!status || r.status === status)
  );
  renderTable(filtered);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('search-input').addEventListener('input', filterData);
document.getElementById('type-filter').addEventListener('change', filterData);
document.getElementById('status-filter').addEventListener('change', filterData);

checkHealth();
loadHistory();
setInterval(checkHealth, 30000);
</script>
</body>
</html>
