<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Bio-Memory</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #f0f2f5; --card: #ffffff; --text: #1a1a2e; --muted: #6c757d;
    --accent: #2563eb; --accent-light: #eff6ff; --border: #e2e8f0;
    --user-bg: #2563eb; --user-text: #ffffff;
    --bot-bg: #ffffff; --bot-text: #1a1a2e;
    --tool-bg: #f8fafc; --tool-border: #cbd5e1;
    --sidebar: #1e293b; --sidebar-text: #94a3b8; --sidebar-active: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 220px; background: var(--sidebar); display: flex; flex-direction: column;
             padding: 16px 12px; gap: 4px; flex-shrink: 0; }
  .sidebar-logo { color: white; font-size: 15px; font-weight: 700; padding: 8px 12px 16px;
                  border-bottom: 1px solid #334155; margin-bottom: 8px; }
  .sidebar-logo span { color: #60a5fa; }
  .sidebar-link { color: var(--sidebar-text); text-decoration: none; padding: 8px 12px;
                  border-radius: 6px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .sidebar-link:hover, .sidebar-link.active { background: #334155; color: var(--sidebar-active); }
  .sidebar-bottom { margin-top: auto; }
  .health-dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8;
                display: inline-block; margin-right: 6px; }
  .health-dot.ok { background: #22c55e; }
  .health-dot.err { background: #ef4444; }
  .backend-switcher { padding: 8px 12px; border-top: 1px solid #334155; margin-top: 8px; }
  .backend-label { color: #64748b; font-size: 11px; text-transform: uppercase;
                   letter-spacing: .05em; margin-bottom: 6px; }
  .backend-toggle { display: flex; background: #0f172a; border-radius: 6px; padding: 2px; gap: 2px; }
  .backend-btn { flex: 1; padding: 5px 0; border: none; border-radius: 4px; font-size: 12px;
                 cursor: pointer; background: transparent; color: #64748b; transition: all .15s; }
  .backend-btn.active { background: #334155; color: #fff; font-weight: 600; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar { background: var(--card); border-bottom: 1px solid var(--border);
            padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
  .topbar-title { font-weight: 600; font-size: 15px; }
  .topbar-sub { font-size: 12px; color: var(--muted); }
  .token-badge { margin-left: auto; font-size: 11px; color: var(--muted);
                 background: var(--bg); padding: 3px 8px; border-radius: 20px; }

  /* Messages */
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex;
              flex-direction: column; gap: 16px; }
  .msg { display: flex; flex-direction: column; max-width: 78%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot  { align-self: flex-start; align-items: flex-start; }
  .bubble { padding: 12px 16px; border-radius: 16px; line-height: 1.65; font-size: 14px;
            word-break: break-word; }
  .msg.user .bubble { background: var(--user-bg); color: var(--user-text);
                      border-bottom-right-radius: 4px; }
  .msg.bot  .bubble { background: var(--bot-bg); color: var(--bot-text);
                      border-bottom-left-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
  .bubble th { background: var(--accent); color: white; padding: 5px 10px; text-align: left; }
  .bubble td { padding: 5px 10px; border-bottom: 1px solid var(--border); }
  .bubble tr:hover td { background: #f0f4ff; }
  .bubble code { background: #f1f5f9; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  .bubble pre  { background: #f1f5f9; padding: 10px; border-radius: 6px; overflow-x: auto;
                 margin: 6px 0; font-size: 12px; }
  .bubble p { margin: 4px 0; }
  .bubble h2, .bubble h3 { margin: 10px 0 4px; font-size: 14px; }

  /* Tool calls */
  .tool-calls { margin-top: 6px; width: 100%; }
  details.tool-item { background: var(--tool-bg); border: 1px solid var(--tool-border);
                      border-radius: 8px; font-size: 12px; overflow: hidden; margin-bottom: 4px; }
  details.tool-item summary { padding: 6px 10px; cursor: pointer; color: var(--muted);
                               list-style: none; display: flex; align-items: center; gap: 6px; }
  details.tool-item summary::-webkit-details-marker { display: none; }
  details.tool-item[open] summary { border-bottom: 1px solid var(--tool-border); }
  .tool-body { padding: 8px 10px; color: #475569; font-family: monospace;
               white-space: pre-wrap; word-break: break-all; max-height: 120px; overflow-y: auto; }

  /* Report link */
  .report-link { margin-top: 8px; }
  .report-link a { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
                   background: var(--accent-light); color: var(--accent); border-radius: 6px;
                   text-decoration: none; font-size: 13px; font-weight: 500; border: 1px solid #bfdbfe; }
  .report-link a:hover { background: #dbeafe; }

  /* Thinking */
  .thinking { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .dots span { animation: blink 1.2s infinite; display: inline-block; }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0; } 40% { opacity: 1; } }

  /* Input */
  .input-area { background: var(--card); border-top: 1px solid var(--border); padding: 14px 20px; }
  .input-row { display: flex; gap: 10px; align-items: flex-end;
               max-width: 860px; margin: 0 auto; }
  textarea { flex: 1; border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px;
             font-size: 14px; font-family: inherit; resize: none; outline: none;
             max-height: 140px; line-height: 1.5; background: var(--bg); }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
  .attach-btn { width: 42px; height: 42px; border-radius: 10px; border: 1px solid var(--border);
                cursor: pointer; background: var(--bg); color: var(--muted); font-size: 18px;
                flex-shrink: 0; display: flex; align-items: center; justify-content: center;
                transition: background .15s; }
  .attach-btn:hover { background: var(--border); }
  .send-btn { width: 42px; height: 42px; border-radius: 10px; border: none; cursor: pointer;
              background: var(--accent); color: white; font-size: 18px; flex-shrink: 0;
              display: flex; align-items: center; justify-content: center; transition: background .15s; }
  .send-btn:hover { background: #1d4ed8; }
  .send-btn:disabled { background: #93c5fd; cursor: not-allowed; }
  .hint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 6px; }

  /* Image preview strip */
  .img-preview-wrap { max-width: 860px; margin: 0 auto 8px; display: none; }
  .img-preview-inner { display: flex; align-items: center; gap: 8px; background: var(--bg);
                        border: 1px solid var(--border); border-radius: 10px; padding: 6px 10px; }
  .img-preview-inner img { height: 56px; border-radius: 6px; object-fit: cover; }
  .img-clear { background: none; border: none; cursor: pointer; color: var(--muted);
               font-size: 16px; line-height: 1; padding: 0 4px; }
  .img-clear:hover { color: #ef4444; }
  .img-name { font-size: 12px; color: var(--muted); flex: 1; overflow: hidden;
              text-overflow: ellipsis; white-space: nowrap; }

  /* Inline images in chat bubbles */
  .bubble img { max-width: 100%; border-radius: 8px; margin: 6px 0; display: block; }

  /* Analysis image cards */
  .img-cards { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
  .img-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
              background: var(--tool-bg); }
  .img-card img { width: 100%; display: block; }
  .img-card-footer { padding: 6px 10px; display: flex; align-items: center;
                     justify-content: space-between; gap: 8px; }
  .img-card-name { font-size: 12px; color: var(--muted); overflow: hidden;
                   text-overflow: ellipsis; white-space: nowrap; }
  .img-dl-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
                background: var(--card); color: var(--accent); font-size: 12px;
                cursor: pointer; text-decoration: none; white-space: nowrap;
                display: inline-flex; align-items: center; gap: 4px; }
  .img-dl-btn:hover { background: var(--accent-light); }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">🧬 <span>Hermes</span> Bio</div>
  <a href="/" class="sidebar-link active">💬 聊天</a>
  <a href="/history" class="sidebar-link">📋 分析歷史</a>
  <div class="sidebar-bottom">
    <div class="backend-switcher">
      <div class="backend-label">推理引擎</div>
      <div class="backend-toggle">
        <button class="backend-btn active" id="btn-local" onclick="setBackend('local')">本機</button>
        <button class="backend-btn" id="btn-claude" onclick="setBackend('claude')">Claude</button>
      </div>
    </div>
    <div class="sidebar-link" id="health-status">
      <span class="health-dot" id="health-dot"></span>
      <span id="health-text">檢查中…</span>
    </div>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">Hermes Bio-Memory Agent</div>
      <div class="topbar-sub">空間轉錄體 · Bulk RNA · 多組學分析</div>
    </div>
    <div class="token-badge" id="token-counter">tokens: —</div>
  </div>

  <div id="messages">
    <div class="msg bot">
      <div class="bubble">
        你好！我是 <strong>Hermes Bio-Memory</strong>，實驗室生物資訊 AI Assistant。<br><br>
        你可以問我：<br>
        · <em>crc_official_v4 前 20 高表達基因是哪些？</em><br>
        · <em>有哪些樣本已完成 EDA 分析？</em><br>
        · <em>幫我分析 ctrl_1_Hair_germ 的空間分布</em>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="img-preview-wrap" id="img-preview-wrap">
      <div class="img-preview-inner">
        <img id="img-preview-thumb" src="" alt="preview">
        <span class="img-name" id="img-preview-name"></span>
        <button class="img-clear" id="img-clear-btn" title="移除圖片">✕</button>
      </div>
    </div>
    <div class="input-row">
      <input type="file" id="file-input" accept="image/*" style="display:none">
      <button class="attach-btn" id="attach-btn" title="附加圖片">🖼</button>
      <textarea id="input" placeholder="輸入問題，Enter 送出，Shift+Enter 換行…"
                rows="1" autofocus></textarea>
      <button class="send-btn" id="send-btn" title="送出">&#10148;</button>
    </div>
    <div class="hint">Hermes Bio-Memory · 本機運行 · 資料不離開實驗室</div>
  </div>
</div>

<script>
// Session
let sessionId = localStorage.getItem('hermes_sid');
if (!sessionId) {
  sessionId = crypto.randomUUID();
  localStorage.setItem('hermes_sid', sessionId);
}

// Backend selection
let currentBackend = localStorage.getItem('hermes_backend') || 'local';

function setBackend(b) {
  currentBackend = b;
  localStorage.setItem('hermes_backend', b);
  document.getElementById('btn-local').classList.toggle('active', b === 'local');
  document.getElementById('btn-claude').classList.toggle('active', b === 'claude');
}

// Init backend from server default, then apply saved preference
fetch('/api/backend').then(r => r.json()).then(d => {
  if (!localStorage.getItem('hermes_backend')) currentBackend = d.default;
  setBackend(currentBackend);
}).catch(() => setBackend(currentBackend));

marked.setOptions({ breaks: true, gfm: true });

const messagesEl   = document.getElementById('messages');
const inputEl      = document.getElementById('input');
const sendBtn      = document.getElementById('send-btn');
const tokenEl      = document.getElementById('token-counter');
const fileInput    = document.getElementById('file-input');
const attachBtn    = document.getElementById('attach-btn');
const previewWrap  = document.getElementById('img-preview-wrap');
const previewThumb = document.getElementById('img-preview-thumb');
const previewName  = document.getElementById('img-preview-name');
const clearBtn     = document.getElementById('img-clear-btn');
let totalIn = 0, totalOut = 0;
let pendingImageB64 = '';  // base64 data URI of image to send

// Image attach
attachBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    pendingImageB64 = e.target.result; // data:image/...;base64,...
    previewThumb.src = pendingImageB64;
    previewName.textContent = file.name;
    previewWrap.style.display = 'block';
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
});
clearBtn.addEventListener('click', clearImage);
function clearImage() {
  pendingImageB64 = '';
  previewWrap.style.display = 'none';
  previewThumb.src = '';
  previewName.textContent = '';
}

// Paste image from clipboard
document.addEventListener('paste', e => {
  const item = [...(e.clipboardData?.items || [])].find(i => i.type.startsWith('image/'));
  if (!item) return;
  const file = item.getAsFile();
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingImageB64 = ev.target.result;
    previewThumb.src = pendingImageB64;
    previewName.textContent = '貼上的圖片';
    previewWrap.style.display = 'block';
  };
  reader.readAsDataURL(file);
});

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);

// 健檢
async function checkHealth() {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    const dot  = document.getElementById('health-dot');
    const text = document.getElementById('health-text');
    if (d.ok) {
      dot.className = 'health-dot ok';
      text.textContent = 'DB: ' + d.db.sample_count + ' 樣本';
    } else {
      dot.className = 'health-dot err';
      text.textContent = 'DB 異常';
    }
  } catch {
    document.getElementById('health-dot').className = 'health-dot err';
  }
}
checkHealth();
setInterval(checkHealth, 30000);

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendMsg(role, html, toolCalls, reportLink, imageB64, images) {
  const msg = document.createElement('div');
  msg.className = 'msg ' + role;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  // 若有附圖（用戶端預覽）則先插縮圖
  if (imageB64) {
    const img = document.createElement('img');
    img.src = imageB64;
    img.style.maxHeight = '180px';
    bubble.appendChild(img);
    const br = document.createElement('div');
    br.style.marginTop = '6px';
    bubble.appendChild(br);
  }
  bubble.innerHTML += html;
  msg.appendChild(bubble);

  if (toolCalls && toolCalls.length > 0) {
    const tc = document.createElement('div');
    tc.className = 'tool-calls';
    toolCalls.forEach(c => {
      const det = document.createElement('details');
      det.className = 'tool-item';
      det.innerHTML = '<summary>🔧 ' + escHtml(c.name) + '</summary>' +
        '<div class="tool-body">' + escHtml(c.result_preview || '') + '</div>';
      tc.appendChild(det);
    });
    msg.appendChild(tc);
  }

  if (reportLink) {
    const rl = document.createElement('div');
    rl.className = 'report-link';
    rl.innerHTML = '<a href="' + reportLink + '" target="_blank">📄 查看完整報告</a>';
    msg.appendChild(rl);
  }

  if (images && images.length > 0) {
    const cards = document.createElement('div');
    cards.className = 'img-cards';
    images.forEach(img => {
      const card = document.createElement('div');
      card.className = 'img-card';
      const im = document.createElement('img');
      im.src = img.data_uri;
      im.alt = img.filename;
      card.appendChild(im);
      const footer = document.createElement('div');
      footer.className = 'img-card-footer';
      const name = document.createElement('span');
      name.className = 'img-card-name';
      name.textContent = img.filename;
      const dl = document.createElement('a');
      dl.className = 'img-dl-btn';
      dl.href = img.data_uri;
      dl.download = img.filename;
      dl.textContent = '⬇ 下載';
      footer.appendChild(name);
      footer.appendChild(dl);
      card.appendChild(footer);
      cards.appendChild(card);
    });
    msg.appendChild(cards);
  }

  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return msg;
}

function appendThinking() {
  const msg = document.createElement('div');
  msg.className = 'msg bot';
  msg.innerHTML = '<div class="thinking"><div class="dots"><span>●</span><span>●</span><span>●</span></div>分析中…</div>';
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return msg;
}

let _sending = false;

async function sendMessage() {
  if (_sending) return;
  const text = inputEl.value.trim();
  if (!text && !pendingImageB64) return;

  _sending = true;
  const imageToSend = pendingImageB64;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  clearImage();

  appendMsg('user', escHtml(text || '（圖片）'), [], null, imageToSend);
  const thinkingEl = appendThinking();

  let toolCalls = [];
  let reportLink = null;

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
      body: JSON.stringify({ session_id: sessionId, message: text, backend: currentBackend, image_base64: imageToSend }),
    });

    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const parts = buffer.split('\n\n');
      buffer = parts.pop();

      for (const part of parts) {
        if (!part.trim()) continue;
        let eventType = 'message';
        let dataLine  = '';
        for (const line of part.split('\n')) {
          if (line.startsWith('event: ')) eventType = line.slice(7).trim();
          if (line.startsWith('data: '))  dataLine  = line.slice(6).trim();
        }
        if (!dataLine) continue;
        let data;
        try { data = JSON.parse(dataLine); } catch { continue; }

        if (eventType === 'tool_calls') {
          toolCalls = data.calls || [];
        } else if (eventType === 'tokens') {
          const inp = data.input  || 0;
          const out = data.output || 0;
          totalIn  += inp;
          totalOut += out;
          if (totalIn > 0 || totalOut > 0) {
            tokenEl.textContent = '↑' + totalIn.toLocaleString() + ' ↓' + totalOut.toLocaleString() + ' tokens';
          } else if ((data.tools || 0) > 0) {
            tokenEl.textContent = 'tools: ' + data.tools;
          }
        } else if (eventType === 'message') {
          reportLink = data.report_link || null;
          const images = data.images || [];
          thinkingEl.remove();
          appendMsg('bot', marked.parse(data.text || ''), toolCalls, reportLink, null, images);
        } else if (eventType === 'error') {
          thinkingEl.remove();
          appendMsg('bot', '<span style="color:#ef4444">⚠ ' + escHtml(data.message || '未知錯誤') + '</span>');
        }
      }
    }
  } catch (err) {
    thinkingEl.remove();
    appendMsg('bot', '<span style="color:#ef4444">⚠ 連線錯誤：' + escHtml(err.message) + '</span>');
  } finally {
    _sending = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}
</script>
</body>
</html>
