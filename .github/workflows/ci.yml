name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint-only:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync --no-install-project --extra dev --python 3.11
      - name: ruff check
        run: uv run ruff check analysis/ server/ config/ scheduler/ --output-format=github
      - name: ruff format check
        run: uv run ruff format --check analysis/ server/ config/ scheduler/
