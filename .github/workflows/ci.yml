name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --no-install-project --extra dev --python ${{ matrix.python-version }}

      - name: Set up test environment
        run: |
          cp .env.example .env
          # Use empty keys for CI — tests mock external calls
          echo "ANTHROPIC_API_KEY=" >> .env
          echo "GOOGLE_API_KEY=" >> .env

      - name: Initialize database
        run: uv run --python ${{ matrix.python-version }} python scripts/00_init_db.py

      - name: Initialize L1 cache
        run: uv run --python ${{ matrix.python-version }} python scripts/03_init_l1_cache.py

      - name: Run migrations
        run: |
          for script in $(ls scripts/[0-9][0-9]_migrate_schema_*.py | sort -V); do
            uv run --python ${{ matrix.python-version }} python "$script"
          done

      - name: Run tests
        run: |
          uv run --python ${{ matrix.python-version }} python -m pytest tests/ \
            -v --tb=short \
            --ignore=tests/test_spatial_ingest.py \
            -x

      - name: Lint (ruff)
        run: |
          uv run --python ${{ matrix.python-version }} ruff check \
            analysis/ server/ config/ scheduler/ \
            --output-format=github

  lint-only:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.11
      - run: uv sync --no-install-project --python 3.11
      - name: ruff check
        run: uv run ruff check analysis/ server/ config/ scheduler/ --output-format=github
      - name: ruff format check
        run: uv run ruff format --check analysis/ server/ config/ scheduler/
